# SonarQube Project Configuration

# Project identification
sonar.projectKey=mams
sonar.projectName=MAMS - Media Asset Management System
sonar.projectVersion=1.0

# Source code configuration
sonar.sources=services,frontend/src
sonar.tests=services/*/tests,frontend/src/**/*.test.ts,frontend/src/**/*.test.tsx
sonar.exclusions=**/__pycache__/**,**/node_modules/**,**/venv/**,**/.venv/**,**/dist/**,**/build/**,**/coverage/**,**/*.spec.ts

# Language-specific settings
sonar.python.version=3.11
sonar.python.coverage.reportPaths=services/*/coverage.xml
sonar.python.xunit.reportPath=services/*/test-results.xml

sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.typescript.lcov.reportPaths=frontend/coverage/lcov.info

# Code coverage
sonar.coverage.exclusions=**/tests/**,**/test_*.py,**/*.test.ts,**/*.test.tsx,**/migrations/**,**/conftest.py

# Duplication
sonar.cpd.exclusions=**/tests/**,**/migrations/**

# Encoding
sonar.sourceEncoding=UTF-8

# Quality Gates
sonar.qualitygate.wait=true

# Service-specific modules
sonar.modules=api-gateway,user-management,storage-abstraction,asset-management,metadata-service,search-engine,ingest-service,proxy-generation,workflow-engine,ai-ml-service,rights-management,monitoring-logging,integration-service,frontend

# API Gateway
api-gateway.sonar.projectBaseDir=services/api-gateway
api-gateway.sonar.sources=src
api-gateway.sonar.tests=tests

# User Management
user-management.sonar.projectBaseDir=services/user-management
user-management.sonar.sources=src
user-management.sonar.tests=tests

# Storage Abstraction
storage-abstraction.sonar.projectBaseDir=services/storage-abstraction
storage-abstraction.sonar.sources=src
storage-abstraction.sonar.tests=tests

# Asset Management
asset-management.sonar.projectBaseDir=services/asset-management
asset-management.sonar.sources=src
asset-management.sonar.tests=tests

# Metadata Service
metadata-service.sonar.projectBaseDir=services/metadata-service
metadata-service.sonar.sources=src
metadata-service.sonar.tests=tests

# Search Engine
search-engine.sonar.projectBaseDir=services/search-engine
search-engine.sonar.sources=src
search-engine.sonar.tests=tests

# Ingest Service
ingest-service.sonar.projectBaseDir=services/ingest-service
ingest-service.sonar.sources=src
ingest-service.sonar.tests=tests

# Proxy Generation
proxy-generation.sonar.projectBaseDir=services/proxy-generation
proxy-generation.sonar.sources=src
proxy-generation.sonar.tests=tests

# Workflow Engine
workflow-engine.sonar.projectBaseDir=services/workflow-engine
workflow-engine.sonar.sources=src
workflow-engine.sonar.tests=tests

# AI/ML Service
ai-ml-service.sonar.projectBaseDir=services/ai-ml-service
