rights-management.sonar.tests=tests

# Monitoring & Logging
monitoring-logging.sonar.projectBaseDir=services/monitoring-logging
monitoring-logging.sonar.sources=src
monitoring-logging.sonar.tests=tests

# Integration Service
integration-service.sonar.projectBaseDir=services/integration-service
