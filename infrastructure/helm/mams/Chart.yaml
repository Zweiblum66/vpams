apiVersion: v2
name: mams
description: Media Asset Management System - Enterprise-grade microservices platform for digital media
type: application
version: 0.1.0
appVersion: "1.0.0"
keywords:
  - mams
  - media
  - asset-management
  - microservices
home: https://github.com/mams-project/mams
sources:
  - https://github.com/mams-project/mams
maintainers:
  - name: MAMS Team
    email: team@mams-project.com
icon: https://raw.githubusercontent.com/mams-project/mams/main/logo.png
dependencies:
  - name: postgresql
    version: "~12.0.0"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: mongodb
    version: "~13.0.0"
    repository: https://charts.bitnami.com/bitnami
    condition: mongodb.enabled
  - name: redis
    version: "~17.0.0"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
  - name: rabbitmq
    version: "~11.0.0"
    repository: https://charts.bitnami.com/bitnami
    condition: rabbitmq.enabled
  - name: opensearch
    version: "~2.0.0"
    repository: https://opensearch-project.github.io/helm-charts/
    condition: opensearch.enabled
annotations:
  artifacthub.io/license: Apache-2.0
  artifacthub.io/containsSecurityUpdates: "false"
  artifacthub.io/prerelease: "false"