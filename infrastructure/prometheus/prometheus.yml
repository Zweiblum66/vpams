# Prometheus configuration for MAMS

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'mams-monitor'
    environment: 'development'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Load rules files
rule_files:
  - '/etc/prometheus/rules/*.yml'

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # MAMS Services
  - job_name: 'mams-services'
    metrics_path: '/metrics'
    scrape_interval: 30s
    static_configs:
      # API Gateway
      - targets: ['api-gateway:8000']
        labels:
          service: 'api-gateway'
          component: 'gateway'
      
      # User Management Service
      - targets: ['user-management:8001']
        labels:
          service: 'user-management'
          component: 'core'
      
      # Storage Abstraction Service
      - targets: ['storage-abstraction:8002']
        labels:
          service: 'storage-abstraction'
          component: 'storage'
      
      # Asset Management Service
      - targets: ['asset-management:8003']
        labels:
          service: 'asset-management'
          component: 'core'
      
      # Metadata Service
      - targets: ['metadata-service:8004']
        labels:
          service: 'metadata-service'
          component: 'core'
      
      # Search Engine Service
      - targets: ['search-engine:8005']
        labels:
          service: 'search-engine'
          component: 'search'
      
      # Ingest Service
      - targets: ['ingest-service:8006']
        labels:
          service: 'ingest-service'
          component: 'processing'
      
      # Proxy Generation Service
      - targets: ['proxy-generation:8007']
        labels:
          service: 'proxy-generation'
          component: 'processing'
      
      # Workflow Engine Service
      - targets: ['workflow-engine:8008']
        labels:
          service: 'workflow-engine'
          component: 'automation'
      
      # AI/ML Service
      - targets: ['ai-ml-service:8009']
        labels:
          service: 'ai-ml-service'
          component: 'intelligence'
      
      # Rights Management Service
      - targets: ['rights-management:8010']
        labels:
          service: 'rights-management'
          component: 'compliance'
      
      # Integration Service
      - targets: ['integration-service:8011']
        labels:
          service: 'integration-service'
          component: 'integration'
      
      # Monitoring Service
      - targets: ['monitoring:8012']
        labels:
          service: 'monitoring'
          component: 'observability'

  # Infrastructure components
  - job_name: 'infrastructure'
    scrape_interval: 30s
    static_configs:
      # PostgreSQL exporter
      - targets: ['postgres-exporter:9187']
        labels:
          component: 'database'
          database: 'postgresql'
      
      # Redis exporter
      - targets: ['redis-exporter:9121']
        labels:
          component: 'cache'
          cache: 'redis'
      
      # RabbitMQ exporter
      - targets: ['rabbitmq:15692']
        labels:
          component: 'messaging'
          queue: 'rabbitmq'
      
      # OpenSearch exporter
      - targets: ['opensearch-exporter:9114']
        labels:
          component: 'search'
          engine: 'opensearch'
      
      # MinIO exporter
      - targets: ['minio:9000']
        labels:
          component: 'storage'
          storage: 'minio'

  # Node exporters for host metrics
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          component: 'host'

  # Docker container metrics
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          component: 'containers'