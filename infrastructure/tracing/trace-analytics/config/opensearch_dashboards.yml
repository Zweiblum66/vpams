# OpenSearch Dashboards Configuration for Trace Analytics

server.name: mams-trace-analytics
server.host: "0.0.0.0"
server.port: 5601

opensearch.hosts: ["https://opensearch-node1:9200"]
opensearch.username: admin
opensearch.password: OpenSearch123!
opensearch.ssl.verificationMode: none
opensearch.requestHeadersWhitelist: [authorization, securitytenant]

# Security settings
opensearch_security.multitenancy.enabled: true
opensearch_security.multitenancy.tenants.preferred: [Private, Global]
opensearch_security.readonly_mode.roles: [kibana_read_only]

# Plugin settings
data_source.enabled: true
vis_type_table.enabled: true
vis_type_metric.enabled: true
vis_type_markdown.enabled: true
vis_type_timeline.enabled: true

# Trace Analytics plugin configuration
traceAnalytics.enabled: true
traceAnalytics.indices.spans: "mams-jaeger-span-*"
traceAnalytics.indices.services: "mams-jaeger-service-*"

# Logging
logging.dest: stdout
logging.silent: false
logging.quiet: false
logging.verbose: false

# UI settings
opensearchDashboards.index: ".opensearch_dashboards"
opensearchDashboards.defaultAppId: "trace-analytics-dashboards"

# Performance settings
server.maxPayloadBytes: 1048576
server.keepAliveTimeout: 120000
server.socketTimeout: 120000

# Maps and visualizations
map.includeOpenSearchMapsService: false
regionmap.includeOpenSearchMapsService: false