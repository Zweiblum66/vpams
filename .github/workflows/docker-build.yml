name: Docker Build and Push

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      services:
        description: 'Comma-separated list of services to build (or "all")'
        required: false
        default: 'all'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/mams

jobs:
  # Determine which services to build
  prepare:
    name: Prepare Build Matrix
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set-matrix.outputs.services }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          elif [[ "${{ github.ref }}" == refs/heads/main ]]; then
            VERSION=latest
          elif [[ "${{ github.ref }}" == refs/heads/develop ]]; then
            VERSION=develop
          else
            VERSION=pr-${{ github.event.pull_request.number }}
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"
      
      - name: Set build matrix
        id: set-matrix
        run: |
          if [[ "${{ github.event.inputs.services }}" == "all" ]] || [[ -z "${{ github.event.inputs.services }}" ]]; then
            SERVICES='["api-gateway","user-management","storage-abstraction","asset-management","metadata-service","search-engine","ingest-service","proxy-generation","workflow-engine","ai-ml-service","rights-management","monitoring-logging","integration-service"]'
          else
            # Convert comma-separated list to JSON array
            SERVICES=$(echo "${{ github.event.inputs.services }}" | jq -R -c 'split(",")')
          fi
          echo "services=${SERVICES}" >> $GITHUB_OUTPUT
          echo "Services to build: ${SERVICES}"

  # Build and push Docker images
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.prepare.outputs.services) }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host
      
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request' && secrets.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
            ${{ secrets.DOCKERHUB_USERNAME && format('docker.io/{0}/mams-{1}', secrets.DOCKERHUB_USERNAME, matrix.service) || '' }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=${{ needs.prepare.outputs.version }}
            type=sha,prefix={{branch}}-
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          file: ./services/${{ matrix.service }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          build-args: |
            VERSION=${{ needs.prepare.outputs.version }}
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            VCS_REF=${{ github.sha }}
      
      - name: Generate SBOM
        if: github.event_name != 'pull_request'
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ needs.prepare.outputs.version }}
          format: spdx-json
          output-file: sbom-${{ matrix.service }}.spdx.json
      
      - name: Upload SBOM
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: sbom-${{ matrix.service }}
          path: sbom-${{ matrix.service }}.spdx.json

  # Build frontend
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=raw,value=${{ needs.prepare.outputs.version }}
      
      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL || '/api/v1' }}

  # Create multi-arch manifest
  manifest:
    name: Create Multi-arch Manifest
    runs-on: ubuntu-latest
    needs: [prepare, build, build-frontend]
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Create and push manifest list
        run: |
          VERSION=${{ needs.prepare.outputs.version }}
          for service in api-gateway user-management storage-abstraction asset-management metadata-service search-engine ingest-service proxy-generation workflow-engine ai-ml-service rights-management monitoring-logging integration-service frontend; do
            docker manifest create \
              ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${service}:${VERSION} \
              --amend ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${service}:${VERSION}-linux-amd64 \
              --amend ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${service}:${VERSION}-linux-arm64
            
            docker manifest push ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${service}:${VERSION}
          done

  # Update deployment configurations
  update-deployments:
    name: Update Deployment Configs
    runs-on: ubuntu-latest
    needs: [prepare, manifest]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Update Kubernetes manifests
        run: |
          VERSION=${{ needs.prepare.outputs.version }}
          for file in infrastructure/kubernetes/*.yaml; do
            sed -i "s|image: .*mams-.*:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-\${SERVICE_NAME}:${VERSION}|g" $file
          done
      
      - name: Update Docker Compose
        run: |
          VERSION=${{ needs.prepare.outputs.version }}
          sed -i "s|image: .*mams-.*:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-\${SERVICE_NAME}:${VERSION}|g" docker-compose.prod.yml
      
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          title: "chore: update image versions to ${{ needs.prepare.outputs.version }}"
          body: |
            This PR updates the Docker image versions to `${{ needs.prepare.outputs.version }}`.
            
            Auto-generated by the Docker Build workflow.
          branch: update-images-${{ needs.prepare.outputs.version }}
          commit-message: "chore: update image versions to ${{ needs.prepare.outputs.version }}"

  # Summary
  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [prepare, build, build-frontend, manifest]
    if: always()
    
    steps:
      - name: Generate summary
        run: |
          echo "## Docker Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version**: ${{ needs.prepare.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Registry**: ${{ env.REGISTRY }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Status" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          
          # Add status for each service
          echo "| API Gateway | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ needs.build-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "### Published Images" >> $GITHUB_STEP_SUMMARY
            echo "Images have been pushed to:" >> $GITHUB_STEP_SUMMARY
            echo "- GitHub Container Registry: \`${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-*:${{ needs.prepare.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          fi