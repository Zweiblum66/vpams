name: Code Quality

on:
  push:
    branches: [main, develop, 'feature/**', 'fix/**']
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # Python Code Quality
  python-quality:
    name: Python Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better analysis
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-quality-${{ hashFiles('requirements-dev.txt') }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install pylint flake8 bandit safety vulture radon xenon
      
      - name: Run Black (formatting check)
        run: |
          echo "### Black Formatting Check" >> $GITHUB_STEP_SUMMARY
          black --check services/ || (echo "❌ Black formatting issues found" >> $GITHUB_STEP_SUMMARY && exit 1)
          echo "✅ Black formatting check passed" >> $GITHUB_STEP_SUMMARY
      
      - name: Run Ruff (linting)
        run: |
          echo "### Ruff Linting" >> $GITHUB_STEP_SUMMARY
          ruff check services/ --output-format=github || (echo "❌ Ruff linting issues found" >> $GITHUB_STEP_SUMMARY && exit 1)
          echo "✅ Ruff linting passed" >> $GITHUB_STEP_SUMMARY
      
      - name: Run MyPy (type checking)
        run: |
          echo "### MyPy Type Checking" >> $GITHUB_STEP_SUMMARY
          mypy services/ --ignore-missing-imports --no-error-summary || (echo "❌ MyPy type issues found" >> $GITHUB_STEP_SUMMARY && exit 1)
          echo "✅ MyPy type checking passed" >> $GITHUB_STEP_SUMMARY
      
      - name: Run Pylint
        continue-on-error: true
        run: |
          echo "### Pylint Analysis" >> $GITHUB_STEP_SUMMARY
          find services -name "*.py" -not -path "*/tests/*" | xargs pylint --disable=C0111,R0903 --output-format=parseable | tee pylint-report.txt
          score=$(tail -n 2 pylint-report.txt | grep -oP 'rated at \K[0-9.]+' || echo "0")
          echo "Pylint Score: $score/10" >> $GITHUB_STEP_SUMMARY
      
      - name: Run Flake8
        continue-on-error: true
        run: |
          echo "### Flake8 Analysis" >> $GITHUB_STEP_SUMMARY
          flake8 services/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 services/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics | tee flake8-report.txt
          echo "Flake8 issues: $(grep -c '^services/' flake8-report.txt || echo 0)" >> $GITHUB_STEP_SUMMARY
      
      - name: Run Bandit (security)
        run: |
          echo "### Bandit Security Scan" >> $GITHUB_STEP_SUMMARY
          bandit -r services/ -f json -o bandit-report.json || true
          python -c "
          import json
          with open('bandit-report.json', 'r') as f:
              report = json.load(f)
          print(f\"Security issues found: {len(report.get('results', []))}\")
          print(f\"- High: {sum(1 for r in report.get('results', []) if r['issue_severity'] == 'HIGH')}\")
          print(f\"- Medium: {sum(1 for r in report.get('results', []) if r['issue_severity'] == 'MEDIUM')}\")
          print(f\"- Low: {sum(1 for r in report.get('results', []) if r['issue_severity'] == 'LOW')}\")
          " >> $GITHUB_STEP_SUMMARY
      
      - name: Run Safety (dependency check)
        continue-on-error: true
        run: |
          echo "### Safety Dependency Check" >> $GITHUB_STEP_SUMMARY
          safety check --json --output safety-report.json || true
          python -c "
          import json
          try:
              with open('safety-report.json', 'r') as f:
                  vulnerabilities = json.load(f)
              print(f\"Vulnerable dependencies: {len(vulnerabilities)}\")
          except:
              print('No vulnerabilities found')
          " >> $GITHUB_STEP_SUMMARY
      
      - name: Code Complexity Analysis
        run: |
          echo "### Code Complexity Analysis" >> $GITHUB_STEP_SUMMARY
          echo "#### Cyclomatic Complexity (Radon)" >> $GITHUB_STEP_SUMMARY
          radon cc services/ -a -nc | tee radon-cc.txt
          avg_cc=$(grep "Average complexity:" radon-cc.txt | awk '{print $3}' | tr -d '()')
          echo "Average Cyclomatic Complexity: $avg_cc" >> $GITHUB_STEP_SUMMARY
          
          echo "#### Maintainability Index (Radon)" >> $GITHUB_STEP_SUMMARY
          radon mi services/ -n -s | head -20 >> $GITHUB_STEP_SUMMARY
      
      - name: Dead Code Detection
        continue-on-error: true
        run: |
          echo "### Dead Code Detection (Vulture)" >> $GITHUB_STEP_SUMMARY
          vulture services/ --min-confidence 80 | head -20 >> $GITHUB_STEP_SUMMARY || echo "No dead code found" >> $GITHUB_STEP_SUMMARY
      
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: python-quality-reports
          path: |
            pylint-report.txt
            flake8-report.txt
            bandit-report.json
            safety-report.json
            radon-cc.txt

  # Frontend Code Quality
  frontend-quality:
    name: Frontend Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        run: |
          cd frontend
          npm ci || npm install
      
      - name: Run ESLint
        run: |
          cd frontend
          echo "### ESLint Analysis" >> $GITHUB_STEP_SUMMARY
          npm run lint -- --format json --output-file eslint-report.json || true
          node -e "
          const report = require('./eslint-report.json');
          const errors = report.reduce((sum, file) => sum + file.errorCount, 0);
          const warnings = report.reduce((sum, file) => sum + file.warningCount, 0);
          console.log(\`ESLint found \${errors} errors and \${warnings} warnings\`);
          " >> $GITHUB_STEP_SUMMARY
      
      - name: Run TypeScript Check
        run: |
          cd frontend
          echo "### TypeScript Check" >> $GITHUB_STEP_SUMMARY
          npx tsc --noEmit || (echo "❌ TypeScript errors found" >> $GITHUB_STEP_SUMMARY && exit 1)
          echo "✅ TypeScript check passed" >> $GITHUB_STEP_SUMMARY
      
      - name: Run Prettier Check
        run: |
          cd frontend
          echo "### Prettier Formatting Check" >> $GITHUB_STEP_SUMMARY
          npx prettier --check "src/**/*.{js,jsx,ts,tsx,css,scss}" || (echo "❌ Prettier formatting issues found" >> $GITHUB_STEP_SUMMARY && exit 1)
          echo "✅ Prettier formatting check passed" >> $GITHUB_STEP_SUMMARY
      
      - name: Bundle Size Analysis
        continue-on-error: true
        run: |
          cd frontend
          echo "### Bundle Size Analysis" >> $GITHUB_STEP_SUMMARY
          npm run build || echo "Build not configured"
          if [ -d "dist" ]; then
            echo "Bundle sizes:" >> $GITHUB_STEP_SUMMARY
            du -sh dist/* | head -10 >> $GITHUB_STEP_SUMMARY
          fi

  # Documentation Quality
  docs-quality:
    name: Documentation Quality
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Check Markdown
        uses: DavidAnson/markdownlint-cli2-action@v14
        with:
          globs: |
            **/*.md
            !**/node_modules/**
            !**/venv/**
      
      - name: Check for broken links
        uses: lycheeverse/lychee-action@v1
        with:
          args: --verbose --no-progress './**/*.md'
          fail: false
      
      - name: Documentation Coverage
        run: |
          echo "### Documentation Coverage" >> $GITHUB_STEP_SUMMARY
          echo "Services with README:" >> $GITHUB_STEP_SUMMARY
          for service in services/*/; do
            if [ -f "$service/README.md" ]; then
              echo "✅ $(basename $service)" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ $(basename $service) - Missing README" >> $GITHUB_STEP_SUMMARY
            fi
          done

  # License and Security Checks
  license-security:
    name: License and Security Checks
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: License Scan
        uses: fossas/fossa-action@main
        continue-on-error: true
        with:
          api-key: ${{ secrets.FOSSA_API_KEY }}
      
      - name: Dependency License Check
        run: |
          pip install pip-licenses
          echo "### Python License Summary" >> $GITHUB_STEP_SUMMARY
          pip-licenses --summary | head -20 >> $GITHUB_STEP_SUMMARY
      
      - name: Security Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
      
      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  # Code Coverage Analysis
  coverage-analysis:
    name: Code Coverage Analysis
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download coverage artifacts
        uses: actions/download-artifact@v3
        with:
          pattern: '*-coverage'
      
      - name: Generate coverage report
        run: |
          echo "### Code Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Coverage |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|----------|" >> $GITHUB_STEP_SUMMARY
          # This would aggregate coverage from test runs
          echo "| Overall | 0% |" >> $GITHUB_STEP_SUMMARY

  # Summary Report
  quality-summary:
    name: Quality Summary
    runs-on: ubuntu-latest
    needs: [python-quality, frontend-quality, docs-quality, license-security]
    if: always()
    
    steps:
      - name: Generate Quality Report
        run: |
          echo "## Code Quality Summary Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Check Results" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Python Quality | ${{ needs.python-quality.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Quality | ${{ needs.frontend-quality.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Documentation | ${{ needs.docs-quality.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security | ${{ needs.license-security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Generated at: $(date -u)" >> $GITHUB_STEP_SUMMARY