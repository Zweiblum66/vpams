name: Mark stale issues and pull requests

on:
  schedule:
    - cron: '0 0 * * *'  # Run daily at midnight UTC

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
    - uses: actions/stale@v10
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        
        # Issue configuration
        stale-issue-message: |
          This issue has been automatically marked as stale because it has not had recent activity. 
          It will be closed in 7 days if no further activity occurs. 
          Thank you for your contributions.
        
        close-issue-message: |
          This issue has been closed due to inactivity. 
          If you believe this is still relevant, please feel free to reopen it or create a new issue.
        
        stale-issue-label: 'stale'
        exempt-issue-labels: 'keep-open,bug,security,in-progress'
        days-before-issue-stale: 30
        days-before-issue-close: 7
        
        # PR configuration
        stale-pr-message: |
          This pull request has been automatically marked as stale because it has not had recent activity. 
          It will be closed in 14 days if no further activity occurs. 
          Please update the PR or add the `keep-open` label to prevent closure.
        
        close-pr-message: |
          This pull request has been closed due to inactivity. 
          If you would like to continue working on this, please reopen the PR or create a new one.
        
        stale-pr-label: 'stale'
        exempt-pr-labels: 'keep-open,work-in-progress,awaiting-review'
        days-before-pr-stale: 14
        days-before-pr-close: 14
        
        # Operation options
        operations-per-run: 100
        remove-stale-when-updated: true
        debug-only: false