version: '3.8'

services:
  mos-integration:
    build: .
    ports:
      - "8011:8011"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:password@postgres:5432/mams
      - REDIS_URL=redis://redis:6379/0
      - MOS_SERVER_ID=mos01.mams.local
      - MOS_LISTEN_PORT=10540
      - MOS_HEARTBEAT_INTERVAL=30
      - LOG_LEVEL=INFO
    depends_on:
      - postgres
      - redis
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
    networks:
      - mams

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: mams
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mams

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - mams

volumes:
  postgres_data:

networks:
  mams:
    driver: bridge