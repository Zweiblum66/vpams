version: '3.8'

services:
  customer-portal:
    build: .
    container_name: mams-customer-portal
    ports:
      - "8014:8014"
    environment:
      - DATABASE_URL=postgresql+asyncpg://mams:mams_password@postgres:5432/customer_portal
      - REDIS_URL=redis://redis:6379/4
      - AUTH_SERVICE_URL=http://user-management:8001
      - BILLING_SERVICE_URL=http://billing:8015
      - SUPPORT_SERVICE_URL=http://support:8016
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-here}
      - ALLOWED_ORIGINS=http://localhost:3000,https://portal.mams.com
      - SMTP_HOST=${SMTP_HOST:-smtp.sendgrid.net}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-apikey}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - ENABLE_METRICS=true
    depends_on:
      - postgres
      - redis
    networks:
      - mams-network
    volumes:
      - ./src:/app/src
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: mams-customer-portal-db
    environment:
      - POSTGRES_USER=mams
      - POSTGRES_PASSWORD=mams_password
      - POSTGRES_DB=customer_portal
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - mams-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: mams-customer-portal-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    networks:
      - mams-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  mams-network:
    external: true