apiVersion: v1
kind: Namespace
metadata:
  name: mams
  labels:
    name: mams
    environment: production
    app.kubernetes.io/name: mams
    app.kubernetes.io/component: namespace
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: kubectl
  annotations:
    description: "MAMS (Media Asset Management System) namespace"
    contact: "support@mams.example.com"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: mams-limits
  namespace: mams
spec:
  limits:
  - default:
      cpu: "500m"
      memory: "1Gi"
    defaultRequest:
      cpu: "100m"
      memory: "256Mi"
    type: Container
  - default:
      storage: "10Gi"
    type: PersistentVolumeClaim
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: mams-quota
  namespace: mams
spec:
  hard:
    requests.cpu: "4"
    requests.memory: "8Gi"
    limits.cpu: "8"
    limits.memory: "16Gi"
    persistentvolumeclaims: "10"
    pods: "20"
    services: "10"
    secrets: "20"
    configmaps: "20"