[pytest]
# Pytest configuration for Workflow Engine Service

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Asyncio configuration
asyncio_mode = auto

# Markers
markers =
    integration: Integration tests that require full service setup
    slow: Tests that take more than a few seconds
    unit: Unit tests that test individual components
    api: API endpoint tests
    engine: Workflow engine tests
    executor: Task executor tests
    state: State management tests
    validation: Validation and designer tests

# Output options
addopts = 
    --strict-markers
    --tb=short
    --disable-warnings
    -p no:warnings

# Coverage options (when run with --cov)
[coverage:run]
source = src
omit = 
    */tests/*
    */conftest.py
    */__init__.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstract

[coverage:html]
directory = htmlcov